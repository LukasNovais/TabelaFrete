<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Frete Inteligente</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.14.0/Sortable.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root {
            --primary: #007bff;
            --success: #28a745;
            --bg: #f4f7f9;
            --card-bg: #ffffff;
            --text: #333;
            --text-light: #666;
            --border: #e1e4e8;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; padding: 10px; background: var(--bg); color: var(--text);
            -webkit-tap-highlight-color: transparent;
        }

        .container { max-width: 600px; margin: auto; }

        .card { 
            background: var(--card-bg); border-radius: 16px; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.08); overflow: hidden; margin-bottom: 20px;
        }

        .tabs { display: flex; background: #eee; padding: 4px; gap: 4px; }
        .tab { 
            flex: 1; padding: 14px 10px; text-align: center; cursor: pointer; 
            font-weight: 600; color: var(--text-light); border-radius: 12px; 
            transition: 0.3s; font-size: 14px;
        }
        .tab.active { background: var(--card-bg); color: var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }

        .content { padding: 16px; display: none; }
        .content.active { display: block; }
        
        label { font-weight: 700; font-size: 12px; display: block; margin-bottom: 6px; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.5px; }
        select, input { 
            width: 100%; padding: 14px; border: 1.5px solid var(--border); 
            border-radius: 12px; font-size: 16px; background: #fafafa;
            margin-bottom: 12px; box-sizing: border-box;
        }

        .destino-item { 
            display: flex; gap: 8px; align-items: center; background: #fff; 
            padding: 10px; border: 1px solid var(--border); border-radius: 14px; 
            margin-bottom: 10px;
        }
        .ponto-letra {
            background: var(--primary); color: white; border-radius: 50%;
            width: 24px; height: 24px; display: flex; align-items: center;
            justify-content: center; font-size: 12px; font-weight: bold; flex-shrink: 0;
        }
        .handle { cursor: grab; color: #ccc; font-size: 22px; padding: 0 4px; }
        .destino-item input { margin-bottom: 0; flex: 1; border-color: #eee; padding: 10px; }
        
        .btn-save {
            background: #e7f3ff; color: var(--primary); border: none;
            border-radius: 10px; width: 40px; height: 40px; cursor: pointer;
            font-size: 18px; display: flex; align-items: center; justify-content: center;
        }

        .btn-remove { 
            background: #fff0f0; color: #ff4444; border: none;
            border-radius: 10px; width: 40px; height: 40px; cursor: pointer;
        }

        .btn-add { 
            background: var(--primary); color: white; border: none; border-radius: 14px; 
            padding: 16px; width: 100%; font-size: 16px; font-weight: 700;
            cursor: pointer; margin: 10px 0 20px 0;
        }

        .mapa { height: 280px; width: 100%; border-radius: 16px; margin-top: 5px; border: 1px solid var(--border); background: #ddd; position: relative; }
        
        /* TEXTO DE CARREGAMENTO */
        .loading-text {
            color: var(--primary); font-size: 13px; font-weight: 700; text-align: center;
            margin-bottom: 5px; display: none; animation: pulse 1.5s infinite;
        }

        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        .km-destaque { 
            color: var(--primary); font-weight: 800; text-align: center; display: block; 
            padding: 14px; background: #eef7ff; border-radius: 14px; margin: 15px 0; font-size: 16px;
        }

        .res-item { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 1px solid #f0f0f0; }
        
        .veiculo-nome { font-weight: 600; color: #444; font-size: 15px; }
        .valor-final { font-weight: 800; color: var(--success); font-size: 18px; display: block; }

        .custom-div-icon {
            background: var(--primary); border: 2px solid white; border-radius: 50%;
            color: white; font-weight: bold; text-align: center; line-height: 20px;
        }

        @media (min-width: 601px) {
            .card { border-radius: 20px; }
            .mapa { height: 350px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="tabs">
            <div class="tab active" onclick="openTab('abaCidades')">Por Cidade</div>
            <div class="tab" onclick="openTab('abaMapa')">Multi-Paradas</div>
        </div>

        <div id="abaCidades" class="content active">
            <label>Cidade de Destino</label>
            <select id="listaDestino" onchange="calcPlanilha()"><option>Carregando...</option></select>
            <div id="resPlanilha" style="display:none">
                <span class="km-destaque">Total: <span id="kmP">0</span> KM</span>
                <div id="listaFretesP"></div>
                <div id="loadP" class="loading-text">Carregando rota, aguarde!</div>
                <div id="mapP" class="mapa"></div>
            </div>
        </div>

        <div id="abaMapa" class="content">
            <label>Rota de Entrega (Arraste para organizar)</label>
            <div id="listaDestinosContainer"></div>
            <button class="btn-add" onclick="addDestinoCampo()">+ Adicionar Parada</button>
            <div id="resMapa" style="display:none">
                <span class="km-destaque">Distância: <span id="kmM">0</span> KM</span>
                <div id="listaFretesM"></div>
                <div id="loadM" class="loading-text">Carregando rota, aguarde!</div>
                <div id="mapM" class="mapa"></div>
            </div>
        </div>
    </div>
</div>

<datalist id="destinosSalvos"></datalist>

<script>
    const urlPlanilha = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS-d_LpmN8-kbhIJsCur_ryTihieutK0R1GKnKAy8HtYMKUMW-49ID0YbXm3zju7ro09Uw3XWBulGV5/pub?gid=1728474295&single=true&output=csv';
    const urlHistorico = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS-d_LpmN8-kbhIJsCur_ryTihieutK0R1GKnKAy8HtYMKUMW-49ID0YbXm3zju7ro09Uw3XWBulGV5/pub?gid=219014695&single=true&output=csv';
    
    const origemCoord = [-16.7014123, -49.1130296];
    let bancoDados = [], precosKm = {}, historicoCoords = {};
    let mapP, mapM, polyP, polyM, markerP, markersM = [];
    const volumes = { toco: 10000, truck: 15000, bitruck: 20000, carreta: 30000 };

    const container = document.getElementById('listaDestinosContainer');
    Sortable.create(container, { 
        handle: '.handle', 
        animation: 150, 
        onEnd: () => { atualizarLetras(); calcMultiRota(); } 
    });

    function atualizarLetras() {
        const itens = container.querySelectorAll('.ponto-letra');
        itens.forEach((span, index) => { span.innerText = String.fromCharCode(65 + index); });
    }

    function addDestinoCampo() {
        const div = document.createElement('div');
        div.className = 'destino-item';
        div.innerHTML = `
            <span class="handle">☰</span>
            <span class="ponto-letra"></span>
            <input type="text" placeholder="Nome ou Lat, Long" oninput="calcMultiRota()" list="destinosSalvos">
            <button class="btn-save" onclick="salvarNoHistorico(this)">💾</button>
            <button class="btn-remove" onclick="this.parentElement.remove(); atualizarLetras(); calcMultiRota();">✕</button>
        `;
        container.appendChild(div);
        atualizarLetras();
    }

    function tratarCoordenada(texto) {
        texto = texto.trim();
        if (historicoCoords[texto]) return historicoCoords[texto];
        let partes = texto.split(/,(?![^,]*$)/);
        if (partes.length >= 2) {
            let lat = partes[0].trim().replace(',', '.');
            let lon = partes[1].trim().replace(',', '.');
            return `${lat},${lon}`;
        }
        return texto;
    }

    function carregarDados() {
        Papa.parse(urlPlanilha, {
            download: true,
            complete: function(results) {
                const linhas = results.data;
                if(linhas[1]) {
                    precosKm = {
                        toco: parseFloat(linhas[1][2]?.replace(',', '.')),
                        truck: parseFloat(linhas[1][3]?.replace(',', '.')),
                        bitruck: parseFloat(linhas[1][2]?.replace(',', '.')),
                        carreta: parseFloat(linhas[1][3]?.replace(',', '.'))
                    };
                }
                bancoDados = linhas.slice(3).filter(l => l[0]);
                popularCidades();
            }
        });

        Papa.parse(urlHistorico, {
            download: true,
            complete: function(results) {
                const list = document.getElementById('destinosSalvos');
                list.innerHTML = "";
                results.data.forEach(l => {
                    if(l[0] && l[1]) {
                        historicoCoords[l[0].trim()] = l[1].trim();
                        let opt = document.createElement('option');
                        opt.value = l[0].trim();
                        list.appendChild(opt);
                    }
                });
            }
        });
    }

    function salvarNoHistorico(btn) {
        const input = btn.parentElement.querySelector('input');
        const valor = tratarCoordenada(input.value);
        if (!valor || valor.split(',').length < 2) { alert("Coordenada inválida."); return; }
        window.open('https://docs.google.com/spreadsheets/d/1vS-d_LpmN8-kbhIJsCur_ryTihieutK0R1GKnKAy8HtYMKUMW-49ID0YbXm3zju7ro09Uw3XWBulGV5/edit#gid=219014695', '_blank');
    }

    async function calcPlanilha() {
        const i = document.getElementById('listaDestino').value;
        if(i === "") return;
        const d = bancoDados[i];
        
        document.getElementById('kmP').innerText = (parseFloat(d[1]?.replace(',', '.')) * 2).toFixed(2);
        let html = '';
        [2,3,4,5].forEach((col, idx) => {
            const frete = parseFloat(d[col]?.replace(/\./g, '').replace(',', '.'));
            html += `<div class="res-item"><span class="veiculo-nome">${['Toco','Truck','Bitruck','Carreta'][idx]}</span><span class="valor-final">R$ ${frete.toLocaleString('pt-BR')}</span></div>`;
        });
        document.getElementById('listaFretesP').innerHTML = html;
        document.getElementById('resPlanilha').style.display = 'block';
        document.getElementById('loadP').style.display = 'block';

        mapP.invalidateSize();

        fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(d[0])},Goias&limit=1`)
            .then(r => r.json()).then(async data => {
                if(data[0]) {
                    const lat = data[0].lat, lon = data[0].lon;
                    const r = await fetch(`https://router.project-osrm.org/route/v1/driving/${origemCoord[1]},${origemCoord[0]};${lon},${lat}?overview=full&geometries=geojson`);
                    const route = await r.json();
                    if(polyP) mapP.removeLayer(polyP);
                    if(markerP) mapP.removeLayer(markerP);
                    polyP = L.geoJSON(route.routes[0].geometry, {color: '#007bff', weight: 5}).addTo(mapP);
                    markerP = L.marker([lat, lon]).addTo(mapP);
                    mapP.fitBounds(polyP.getBounds(), {padding: [30, 30]});
                    document.getElementById('loadP').style.display = 'none';
                }
            });
    }

    async function calcMultiRota() {
        const inputs = Array.from(container.querySelectorAll('input'));
        const rawValues = inputs.map(i => i.value.trim()).filter(v => v !== "");
        if (rawValues.length === 0) return;
        
        document.getElementById('resMapa').style.display = 'block';
        document.getElementById('loadM').style.display = 'block';

        let paradas = rawValues.map(v => tratarCoordenada(v));
        let pontos = `${origemCoord[1]},${origemCoord[0]}`;
        paradas.forEach(p => { const c = p.split(','); if(c.length === 2) pontos += `;${c[1].trim()},${c[0].trim()}`; });

        mapM.invalidateSize();

        try {
            const r = await fetch(`https://router.project-osrm.org/route/v1/driving/${pontos}?overview=full&geometries=geojson`);
            const data = await r.json();
            if(data.routes && data.routes[0]) {
                const km = (data.routes[0].distance / 1000) * 2;
                if(polyM) mapM.removeLayer(polyM);
                markersM.forEach(m => mapM.removeLayer(m));
                markersM = [];

                polyM = L.geoJSON(data.routes[0].geometry, {color: '#007bff', weight: 5}).addTo(mapM);
                markersM.push(L.marker(origemCoord).addTo(mapM));
                paradas.forEach((p, idx) => {
                    const c = p.split(',');
                    const icon = L.divIcon({className: 'custom-div-icon', html: String.fromCharCode(65 + idx), iconSize: [22, 22]});
                    markersM.push(L.marker([c[0], c[1]], {icon: icon}).addTo(mapM));
                });

                mapM.fitBounds(polyM.getBounds(), {padding: [30, 30]});
                document.getElementById('kmM').innerText = km.toFixed(2);
                document.getElementById('loadM').style.display = 'none';
                
                let html = '';
                ['toco','truck','bitruck','carreta'].forEach(v => {
                    let total = Math.ceil((km * (precosKm[v] || 0)) / 100) * 100;
                    html += `<div class="res-item"><span class="veiculo-nome">${v.toUpperCase()}</span><span class="valor-final">R$ ${total.toLocaleString('pt-BR')}</span></div>`;
                });
                document.getElementById('listaFretesM').innerHTML = html;
            }
        } catch (e) { }
    }

    function initMaps() {
        const cfg = { attributionControl: false, zoomControl: false, fadeAnimation: false, markerZoomAnimation: false };
        mapP = L.map('mapP', cfg).setView(origemCoord, 7);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapP);
        mapM = L.map('mapM', cfg).setView(origemCoord, 7);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapM);
    }

    function openTab(id) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        setTimeout(() => { 
            if(id === 'abaCidades') mapP.invalidateSize();
            else mapM.invalidateSize();
        }, 50);
    }

    function popularCidades() {
        let s = document.getElementById('listaDestino');
        s.innerHTML = '<option value="">Selecione...</option>';
        bancoDados.sort((a,b) => a[0].localeCompare(b[0])).forEach((l, i) => {
            let o = document.createElement('option'); o.value = i; o.innerText = l[0]; s.appendChild(o);
        });
    }

    window.onload = () => { carregarDados(); initMaps(); addDestinoCampo(); };
</script>
</body>
</html>
