<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frete Automático - ANTT Realtime</title>
    <style>
        :root { --primary: #004a99; --success: #2ecc71; --warning: #f1c40f; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; margin: 0; }
        .card { max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .header { text-align: center; border-bottom: 2px solid #eee; margin-bottom: 20px; padding-bottom: 10px; }
        .update-badge { font-size: 10px; background: #e0e0e0; padding: 4px 8px; border-radius: 10px; color: #666; }
        select, input { width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #eee; border-radius: 12px; font-size: 16px; outline: none; }
        .result-box { margin-top: 20px; background: #f9f9f9; border-radius: 15px; padding: 15px; border-left: 5px solid var(--primary); }
        .row-frete { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #eee; }
        .label-veiculo { font-weight: bold; color: #333; }
        .val-antt { font-size: 11px; color: var(--warning); font-weight: bold; display: block; }
        .val-meu { font-size: 18px; font-weight: 900; color: var(--success); }
        .alerta { font-size: 10px; color: red; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h2 style="margin:0; color: var(--primary);">Transportadora Pro</h2>
        <span id="dataSync" class="update-badge">Sincronizando ANTT...</span>
    </div>

    <label>Cidade de Destino</label>
    <select id="selCidade" onchange="app.calc(this.value)">
        <option>Carregando cidades...</option>
    </select>

    <div id="resultado" style="display:none">
        <div style="text-align: center; font-weight: bold; color: var(--primary); margin: 10px 0;">
            KM Total (Ida/Volta): <span id="kmTotal">0</span> KM
        </div>
        <div id="lista"></div>
    </div>
</div>

<script>
const CONFIG = {
    api: 'https://script.google.com/macros/s/AKfycbxGk5uWnVK8ht6niF396WM7PeWGXHaEEz7CWpq3s6pJ8mimk3FWFA34yasu3a0DncT2/exec',
    veiculos: [
        { nome: 'Toco', col: 2, eixos: 2 },
        { nome: 'Truck', col: 3, eixos: 3 },
        { nome: 'Bitruck', col: 4, eixos: 4 },
        { nome: 'Carreta', col: 5, eixos: 5 }
    ]
};

let baseDados = { cidades: [], antt: {} };

const app = {
    init: async () => {
        const resp = await fetch(CONFIG.api);
        const data = await resp.json();
        baseDados.cidades = data.cidades;
        baseDados.antt = data.antt;
        document.getElementById('dataSync').innerText = `ANTT Oficial: ${data.dataAtualizacao}`;
        app.render();
    },

    render: () => {
        const sel = document.getElementById('selCidade');
        sel.innerHTML = '<option value="">Selecione...</option>';
        baseDados.cidades.forEach((c, i) => {
            const opt = document.createElement('option');
            opt.value = i;
            opt.innerText = `${c[0]} (${c[1]} KM)`;
            sel.appendChild(opt);
        });
    },

    calc: (i) => {
        if(!i) return;
        const cidade = baseDados.cidades[i];
        const kmTotal = parseFloat(cidade[1]) * 2;
        document.getElementById('kmTotal').innerText = kmTotal;
        document.getElementById('resultado').style.display = 'block';

        let html = '';
        CONFIG.veiculos.forEach(v => {
            let meuPreco = parseFloat(String(cidade[v.col]).replace(/\./g,'').replace(',','.'));
            let coef = baseDados.antt[v.eixos];
            let precoAntt = (coef.ccd * kmTotal) + coef.cc;

            html += `
                <div class="row-frete">
                    <div>
                        <span class="label-veiculo">${v.nome}</span>
                        <span class="val-antt">MÍNIMO ANTT: R$ ${precoAntt.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</span>
                    </div>
                    <div style="text-align: right">
                        <span class="val-meu">R$ ${meuPreco.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</span>
                        ${meuPreco < precoAntt ? '<br><span class="alerta">Abaixo da ANTT</span>' : ''}
                    </div>
                </div>`;
        });
        document.getElementById('lista').innerHTML = html;
    }
};

window.onload = app.init;
</script>
</body>
</html>
