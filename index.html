<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Frete Inteligente - Senador Canedo</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 10px; max-width: 600px; margin: auto; background: #f0f2f5; }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden; }
        .tabs { display: flex; background: #e4e6eb; }
        .tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; font-weight: bold; color: #65676b; }
        .tab.active { background: white; color: #007bff; border-bottom: 3px solid #007bff; }
        .content { padding: 20px; display: none; }
        .content.active { display: block; }
        .campo { margin-bottom: 12px; }
        label { font-weight: bold; font-size: 13px; display: block; margin-bottom: 4px; }
        select, input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .res-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f0f0f0; }
        .valor-final { font-weight: bold; color: #28a745; font-size: 16px; }
        .valor-litro { color: #666; font-size: 12px; font-style: italic; margin-left: 5px; }
        .km-destaque { color: #007bff; font-weight: bold; text-align: center; display: block; margin: 10px 0; background: #eef7ff; padding: 5px; border-radius: 5px; }
        .mapa { height: 250px; width: 100%; border-radius: 8px; margin-top: 10px; border: 1px solid #ccc; }
    </style>
</head>
<body>

<div class="card">
    <div class="tabs">
        <div class="tab active" onclick="openTab('abaCidades')">Por Cidade</div>
        <div class="tab" onclick="openTab('abaMapa')">Por Coordenada</div>
    </div>

    <div id="abaCidades" class="content active">
        <label>Selecione a Cidade:</label>
        <select id="listaDestino" onchange="calcPlanilha()"><option>Carregando cidades...</option></select>
        <div id="resPlanilha" style="display:none">
            <span class="km-destaque">Distância: <span id="kmP">0</span> KM (Ida/Volta)</span>
            <div id="listaFretesP"></div>
            <div id="mapP" class="mapa"></div>
        </div>
    </div>

    <div id="abaMapa" class="content">
        <div class="campo">
            <label>Coordenada Origem (Senador Canedo):</label>
            <input type="text" id="coordOrigem" value="-16.7014123,-49.1130296" readonly>
        </div>
        <div class="campo">
            <label>Coordenada Destino (Lat, Long):</label>
            <input type="text" id="coordDestino" placeholder="Ex: -16.452, -49.231" oninput="calcRotaAutomatica()">
        </div>
        <div id="resMapa" style="display:none">
            <span class="km-destaque">Rota Rápida: <span id="kmM">0</span> KM (Ida/Volta)</span>
            <div id="listaFretesM"></div>
            <div id="mapM" class="mapa"></div>
        </div>
    </div>
</div>

<script>
    const urlCSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS-d_LpmN8-kbhIJsCur_ryTihieutK0R1GKnKAy8HtYMKUMW-49ID0YbXm3zju7ro09Uw3XWBulGV5/pub?gid=1728474295&single=true&output=csv';
    const origemCoord = [-16.7014123, -49.1130296];
    let bancoDados = [], precosKm = {};
    let mapP, mapM, polyP, polyM, markerP, markerM;

    const volumes = { toco: 10000, truck: 15000, bitruck: 20000, carreta: 30000 };

    function openTab(id) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        setTimeout(() => { 
            if(mapP) mapP.invalidateSize(); 
            if(mapM) mapM.invalidateSize(); 
        }, 200);
    }

    // Carregar Planilha
    Papa.parse(urlCSV, {
        download: true,
        header: false,
        complete: function(results) {
            const linhas = results.data;
            // Pega precos por KM na Linha 2 (índice 1)
            precosKm = {
                toco: parseFloat(linhas[1][2].replace(',', '.')),
                truck: parseFloat(linhas[1][3].replace(',', '.')),
                bitruck: parseFloat(linhas[1][2].replace(',', '.')), // C2 conforme pedido
                carreta: parseFloat(linhas[1][3].replace(',', '.'))  // D2 conforme pedido
            };

            bancoDados = linhas.slice(3).filter(l => l[0]);
            bancoDados.sort((a, b) => a[0].trim().localeCompare(b[0].trim()));
            
            let select = document.getElementById('listaDestino');
            select.innerHTML = '<option value="">Selecione...</option>';
            bancoDados.forEach((l, i) => {
                let opt = document.createElement('option');
                opt.value = i; opt.innerHTML = l[0];
                select.appendChild(opt);
            });
            initMaps();
        }
    });

    function initMaps() {
        mapP = L.map('mapP').setView(origemCoord, 8);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapP);
        L.marker(origemCoord).addTo(mapP);

        mapM = L.map('mapM').setView(origemCoord, 8);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapM);
        L.marker(origemCoord).addTo(mapM);
    }

    async function getRoute(mapObj, polyObj, markerObj, start, end, callback) {
        const url = `https://router.project-osrm.org/route/v1/driving/${start[1]},${start[0]};${end[1]},${end[0]}?overview=full&geometries=geojson`;
        try {
            const response = await fetch(url);
            const data = await response.json();
            if(data.routes && data.routes[0]) {
                if(polyObj) mapObj.removeLayer(polyObj);
                if(markerObj) mapObj.removeLayer(markerObj);
                const poly = L.geoJSON(data.routes[0].geometry, {color: '#007bff'}).addTo(mapObj);
                const mark = L.marker(end).addTo(mapObj);
                mapObj.fitBounds(poly.getBounds(), {padding: [20,20]});
                callback((data.routes[0].distance / 1000) * 2, poly, mark);
            }
        } catch (e) { console.error("Erro na rota."); }
    }

    const formatM = (v) => "R$ " + v.toLocaleString('pt-BR', {minimumFractionDigits: 2, maximumFractionDigits: 2});
    const formatL = (v) => "(R$ " + v.toLocaleString('pt-BR', {minimumFractionDigits: 3, maximumFractionDigits: 3}) + "/L)";

    function calcPlanilha() {
        const i = document.getElementById('listaDestino').value;
        if(i === "") return;
        const d = bancoDados[i];
        const kmIda = parseFloat(d[1].replace(',', '.'));
        
        document.getElementById('kmP').innerText = (kmIda * 2).toFixed(2);
        
        let html = '';
        const labels = ['Toco', 'Truck', 'Bitruck', 'Carreta'];
        [2,3,4,5].forEach((col, idx) => {
            const frete = parseFloat(d[col].replace(/\./g, '').replace(',', '.'));
            const litro = parseFloat(d[col+4].replace(/\./g, '').replace(',', '.'));
            html += `<div class="res-item"><span>${labels[idx]}</span><div style="text-align:right"><span class="valor-final">${formatM(frete)}</span><br><span class="valor-litro">${formatL(litro)}</span></div></div>`;
        });
        document.getElementById('listaFretesP').innerHTML = html;
        document.getElementById('resPlanilha').style.display = 'block';

        fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${d[0]}, Goias`)
            .then(r => r.json()).then(data => {
                if(data[0]) getRoute(mapP, polyP, markerP, origemCoord, [data[0].lat, data[0].lon], (km, p, m) => { polyP = p; markerP = m; });
            });
    }

    function calcRotaAutomatica() {
        const val = document.getElementById('coordDestino').value;
        const parts = val.split(',');
        if(parts.length === 2) {
            const lat = parseFloat(parts[0].trim());
            const lon = parseFloat(parts[1].trim());
            if(!isNaN(lat) && !isNaN(lon)) {
                getRoute(mapM, polyM, markerM, origemCoord, [lat, lon], (kmTotal, p, m) => {
                    polyM = p; markerM = m;
                    document.getElementById('kmM').innerText = kmTotal.toFixed(2);
                    let html = '';
                    ['toco', 'truck', 'bitruck', 'carreta'].forEach(v => {
                        let total = Math.ceil((kmTotal * precosKm[v]) / 100) * 100;
                        let vLitro = total / volumes[v];
                        html += `<div class="res-item"><span>${v.toUpperCase()}</span><div style="text-align:right"><span class="valor-final">${formatM(total)}</span><br><span class="valor-litro">${formatL(vLitro)}</span></div></div>`;
                    });
                    document.getElementById('listaFretesM').innerHTML = html;
                    document.getElementById('resMapa').style.display = 'block';
                });
            }
        }
    }
</script>
</body>
</html>
