<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Frete Multi-Destino GO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.14.0/Sortable.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 10px; max-width: 600px; margin: auto; background: #f0f2f5; }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden; }
        .tabs { display: flex; background: #e4e6eb; }
        .tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; font-weight: bold; color: #65676b; }
        .tab.active { background: white; color: #007bff; border-bottom: 3px solid #007bff; }
        .content { padding: 20px; display: none; }
        .content.active { display: block; }
        
        .destino-item { display: flex; gap: 8px; align-items: center; background: #f8f9fa; padding: 10px; border: 1px solid #ddd; border-radius: 6px; margin-bottom: 8px; }
        .handle { cursor: grab; color: #999; font-size: 20px; padding: 0 5px; }
        .destino-item input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        .btn-remove { background: #ff4444; color: white; border: none; border-radius: 4px; width: 35px; height: 35px; cursor: pointer; font-weight: bold; }
        .btn-add { background: #007bff; color: white; border: none; border-radius: 6px; padding: 12px; width: 100%; cursor: pointer; margin-bottom: 15px; font-weight: bold; }
        
        .mapa { height: 350px; width: 100%; border-radius: 8px; margin-top: 15px; border: 1px solid #ccc; background: #eee; }
        .res-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee; }
        .valor-final { font-weight: bold; color: #28a745; font-size: 17px; }
        .valor-litro { color: #666; font-size: 12px; font-style: italic; }
        .km-destaque { color: #007bff; font-weight: bold; text-align: center; display: block; padding: 10px; background: #eef7ff; border-radius: 5px; margin: 10px 0; }
    </style>
</head>
<body>

<div class="card">
    <div class="tabs">
        <div class="tab active" onclick="openTab('abaCidades')">Por Cidade</div>
        <div class="tab" onclick="openTab('abaMapa')">Multi-Coordenadas</div>
    </div>

    <div id="abaCidades" class="content active">
        <label>Cidade de Destino:</label>
        <select id="listaDestino" onchange="calcPlanilha()"><option>Carregando cidades...</option></select>
        <div id="resPlanilha" style="display:none">
            <span class="km-destaque">KM Total: <span id="kmP">0</span> (Ida/Volta)</span>
            <div id="listaFretesP"></div>
            <div id="mapP" class="mapa"></div>
        </div>
    </div>

    <div id="abaMapa" class="content">
        <label>Pontos de Parada (Arraste ☰ para ordenar):</label>
        <div id="listaDestinosContainer"></div>
        <button class="btn-add" onclick="addDestinoCampo()">+ Adicionar Parada</button>
        
        <div id="resMapa" style="display:none">
            <span class="km-destaque">Distância Total: <span id="kmM">0</span> KM (Ida/Volta)</span>
            <div id="listaFretesM"></div>
            <div id="mapM" class="mapa"></div>
        </div>
    </div>
</div>

<datalist id="destinosSalvos"></datalist>

<script>
    // URLs das Planilhas
    const urlPlanilha = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS-d_LpmN8-kbhIJsCur_ryTihieutK0R1GKnKAy8HtYMKUMW-49ID0YbXm3zju7ro09Uw3XWBulGV5/pub?gid=1728474295&single=true&output=csv';
    const urlHistorico = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS-d_LpmN8-kbhIJsCur_ryTihieutK0R1GKnKAy8HtYMKUMW-49ID0YbXm3zju7ro09Uw3XWBulGV5/pub?gid=219014695&single=true&output=csv';
    
    const origemCoord = [-16.7014123, -49.1130296];
    let bancoDados = [], precosKm = {}, historicoCoords = {};
    let mapP, mapM, polyP, polyM, markerP, markersM = [];
    const volumes = { toco: 10000, truck: 15000, bitruck: 20000, carreta: 30000 };

    // Sortable.js para arrastar os campos
    const container = document.getElementById('listaDestinosContainer');
    Sortable.create(container, { handle: '.handle', animation: 150, onEnd: () => calcMultiRota() });

    function addDestinoCampo() {
        const div = document.createElement('div');
        div.className = 'destino-item';
        div.innerHTML = `
            <span class="handle">☰</span>
            <input type="text" placeholder="Nome ou Coordenada" oninput="calcMultiRota()" list="destinosSalvos">
            <button class="btn-remove" onclick="this.parentElement.remove(); calcMultiRota();">✕</button>
        `;
        container.appendChild(div);
    }

    function carregarDados() {
        // 1. Carregar Preços e Cidades
        Papa.parse(urlPlanilha, {
            download: true,
            complete: function(results) {
                const linhas = results.data;
                precosKm = {
                    toco: parseFloat(linhas[1][2].replace(',', '.')),
                    truck: parseFloat(linhas[1][3].replace(',', '.')),
                    bitruck: parseFloat(linhas[1][2].replace(',', '.')),
                    carreta: parseFloat(linhas[1][3].replace(',', '.'))
                };
                bancoDados = linhas.slice(3).filter(l => l[0]);
                popularCidades();
            }
        });

        // 2. Carregar Aba Historico (Favoritos)
        Papa.parse(urlHistorico, {
            download: true,
            complete: function(results) {
                const list = document.getElementById('destinosSalvos');
                list.innerHTML = "";
                results.data.forEach(l => {
                    if(l[0] && l[1]) {
                        historicoCoords[l[0].trim()] = l[1].trim();
                        let opt = document.createElement('option');
                        opt.value = l[0].trim();
                        list.appendChild(opt);
                    }
                });
            }
        });
    }

    async function getRoute(mapObj, polyObj, markerRef, start, end, isMulti = false) {
        let pontosURL = isMulti ? end : `${start[1]},${start[0]};${end[1]},${end[0]}`;
        const url = `https://router.project-osrm.org/route/v1/driving/${pontosURL}?overview=full&geometries=geojson`;
        
        try {
            const response = await fetch(url);
            const data = await response.json();
            if(data.routes && data.routes[0]) {
                const route = data.routes[0];
                const km = (route.distance / 1000) * 2;
                
                // Limpeza
                if(polyObj && mapObj.hasLayer(polyObj)) mapObj.removeLayer(polyObj);
                if(!isMulti && markerRef && mapObj.hasLayer(markerRef)) mapObj.removeLayer(markerRef);
                if(isMulti) markersM.forEach(m => mapObj.removeLayer(m));

                const newPoly = L.geoJSON(route.geometry, {color: '#007bff', weight: 5}).addTo(mapObj);
                
                if(isMulti) {
                    markersM = [];
                    const paradas = end.split(';');
                    paradas.forEach(p => {
                        const [lon, lat] = p.split(',');
                        markersM.push(L.marker([lat, lon]).addTo(mapObj));
                    });
                } else {
                    markerP = L.marker(end).addTo(mapObj);
                }

                mapObj.fitBounds(newPoly.getBounds(), {padding: [40, 40]});
                return {km, poly: newPoly};
            }
        } catch (e) { console.error("Erro na rota."); return null; }
    }

    async function calcMultiRota() {
        const inputs = Array.from(container.querySelectorAll('input'));
        const rawValues = inputs.map(i => i.value.trim());
        if (rawValues.some(v => v === "") || rawValues.length === 0) return;

        let paradasStr = `${origemCoord[1]},${origemCoord[0]}`;
        rawValues.forEach(v => {
            const coord = historicoCoords[v] || v;
            const c = coord.split(',');
            if(c.length === 2) paradasStr += `;${c[1].trim()},${c[0].trim()}`;
        });

        const result = await getRoute(mapM, polyM, null, null, paradasStr, true);
        if(result) {
            polyM = result.poly;
            document.getElementById('kmM').innerText = result.km.toFixed(2);
            let html = '';
            ['toco', 'truck', 'bitruck', 'carreta'].forEach(v => {
                let total = Math.ceil((result.km * precosKm[v]) / 100) * 100;
                html += `<div class="res-item"><span>${v.toUpperCase()}</span><div style="text-align:right"><span class="valor-final">R$ ${total.toLocaleString('pt-BR')}</span><br><span class="valor-litro">R$ ${(total/volumes[v]).toFixed(3)}/L</span></div></div>`;
            });
            document.getElementById('listaFretesM').innerHTML = html;
            document.getElementById('resMapa').style.display = 'block';
        }
    }

    function calcPlanilha() {
        const i = document.getElementById('listaDestino').value;
        if(i === "") return;
        const d = bancoDados[i];
        const kmIda = parseFloat(d[1].replace(',', '.'));
        document.getElementById('kmP').innerText = (kmIda * 2).toFixed(2);
        
        let html = '';
        const labels = ['Toco', 'Truck', 'Bitruck', 'Carreta'];
        [2,3,4,5].forEach((col, idx) => {
            const frete = parseFloat(d[col].replace(/\./g, '').replace(',', '.'));
            const litro = parseFloat(d[col+4].replace(/\./g, '').replace(',', '.'));
            html += `<div class="res-item"><span>${labels[idx]}</span><div style="text-align:right"><span class="valor-final">R$ ${frete.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</span><br><span class="valor-litro">R$ ${litro.toFixed(3)}/L</span></div></div>`;
        });
        document.getElementById('listaFretesP').innerHTML = html;
        document.getElementById('resPlanilha').style.display = 'block';

        fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${d[0]}, Goias`)
            .then(r => r.json()).then(async data => {
                if(data[0]) {
                    const res = await getRoute(mapP, polyP, markerP, origemCoord, [data[0].lat, data[0].lon]);
                    if(res) polyP = res.poly;
                }
            });
    }

    function initMaps() {
        const cfg = { attributionControl: false };
        mapP = L.map('mapP', cfg).setView(origemCoord, 7);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapP);
        L.marker(origemCoord).addTo(mapP);

        mapM = L.map('mapM', cfg).setView(origemCoord, 7);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapM);
        L.marker(origemCoord).addTo(mapM);
    }

    function openTab(id) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        setTimeout(() => { if(mapM) mapM.invalidateSize(); if(mapP) mapP.invalidateSize(); }, 300);
    }

    function popularCidades() {
        let select = document.getElementById('listaDestino');
        select.innerHTML = '<option value="">Selecione...</option>';
        bancoDados.sort((a, b) => a[0].trim().localeCompare(b[0].trim())).forEach((l, i) => {
            let opt = document.createElement('option');
            opt.value = i; opt.innerHTML = l[0];
            select.appendChild(opt);
        });
    }

    window.onload = () => { carregarDados(); initMaps(); addDestinoCampo(); };
</script>
</body>
</html>
