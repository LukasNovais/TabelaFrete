<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frete Pro - Inteligente</title>
    <style>
        :root { --blue: #004a99; --green: #28a745; --orange: #f39c12; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 15px; margin: 0; }
        .card { max-width: 650px; margin: auto; background: white; border-radius: 16px; box-shadow: 0 4px 25px rgba(0,0,0,0.1); padding: 25px; }
        .input-row { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        .field { flex: 1; min-width: 200px; }
        label { font-size: 11px; font-weight: 800; color: #666; text-transform: uppercase; margin-bottom: 8px; display: block; }
        select, input { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        .km-panel { background: var(--blue); color: white; padding: 15px; border-radius: 12px; text-align: center; margin-bottom: 20px; }
        .km-val { font-size: 28px; font-weight: 900; display: block; }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #f1f1f1; }
        .v-nome { font-weight: 800; font-size: 17px; color: #333; }
        .v-antt { font-size: 11px; color: var(--orange); font-weight: bold; }
        .price-final { font-size: 20px; font-weight: 900; color: var(--green); display: block; }
        .v-litro { font-size: 12px; color: #888; font-weight: bold; }
        .alerta { color: #e74c3c; font-size: 10px; font-weight: 900; text-transform: uppercase; display: block; }
    </style>
</head>
<body>

<div class="card">
    <div class="input-row">
        <div class="field">
            <label>Cidade Destino</label>
            <select id="selCidade" onchange="app.porCidade(this.value)"><option>Carregando...</option></select>
        </div>
        <div class="field">
            <label>KM Ida (Manual)</label>
            <input type="number" id="kmMan" placeholder="Ex: 360" oninput="app.porKm(this.value)">
        </div>
    </div>

    <div id="displayKM" class="km-panel" style="display:none">
        <span style="font-size: 11px; opacity: 0.8; font-weight: bold;">TOTAL IDA + VOLTA</span>
        <span class="km-val"><span id="kmTotal">0</span> KM</span>
    </div>

    <div id="lista"></div>
</div>

<script>
const CONFIG = {
    api: 'https://script.google.com/macros/s/AKfycbzTNAXlUV8axvHQ4AT4hgDudVJy_xoTQBY5-wcqETsqxC5j3zobOVfgcuyfU9OIYhQA/exec',
    veiculos: [
        { nome: 'Toco', eixos: 2, col: 2, vol: 10000 },
        { nome: 'Truck', eixos: 3, col: 3, vol: 15000 },
        { nome: 'Bitruck', eixos: 4, col: 4, vol: 20000 },
        { nome: 'Carreta', eixos: 5, col: 5, vol: 30000 }
    ]
};

let base = { cidades: [], antt: {} };

const app = {
    init: async () => {
        const r = await fetch(CONFIG.api);
        base = await r.json();
        app.renderSel();
    },

    renderSel: () => {
        const s = document.getElementById('selCidade');
        s.innerHTML = '<option value="">Selecione a Cidade...</option>';
        base.cidades.forEach((c, i) => {
            const o = document.createElement('option');
            o.value = i; o.innerText = `${c[0]} (${c[1]} KM)`;
            s.appendChild(o);
        });
    },

    porCidade: (i) => {
        if(!i) return;
        document.getElementById('kmMan').value = '';
        app.calcular(parseFloat(base.cidades[i][1]), base.cidades[i]);
    },

    porKm: (km) => {
        if(!km) return;
        document.getElementById('selCidade').value = '';
        const kmIda = parseFloat(km);
        // Busca na planilha o preço da cidade que tem o KM mais próximo do digitado
        const linhaProxima = base.cidades.reduce((prev, curr) => 
            Math.abs(curr[1] - kmIda) < Math.abs(prev[1] - kmIda) ? curr : prev
        );
        app.calcular(kmIda, linhaProxima);
    },

    calcular: (kmIda, row) => {
        const kmTotal = kmIda * 2;
        document.getElementById('displayKM').style.display = 'block';
        document.getElementById('kmTotal').innerText = kmTotal.toLocaleString();

        let html = '';
        CONFIG.veiculos.forEach(v => {
            const c = base.antt[v.eixos];
            // Fórmula: Ida + Retorno Vazio (92% do deslocamento)
            const valorAntt = ((kmIda * c.ccd) + c.cc) + ((kmIda * c.ccd) * 0.92);
            const meuPreco = parseFloat(String(row[v.col]).replace(/\./g,'').replace(',','.'));
            const valorPorLitro = meuPreco / v.vol;

            html += `
                <div class="item">
                    <div>
                        <span class="v-nome">${v.nome}</span>
                        <span class="v-antt">ANTT: R$ ${valorAntt.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</span>
                    </div>
                    <div style="text-align:right">
                        <span class="price-final">R$ ${meuPreco.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</span>
                        <span class="v-litro">R$ ${valorPorLitro.toFixed(3)}/L</span>
                        ${meuPreco < valorAntt ? '<span class="alerta">Abaixo da Lei</span>' : ''}
                    </div>
                </div>`;
        });
        document.getElementById('lista').innerHTML = html;
    }
};
window.onload = app.init;
</script>
</body>
</html>
